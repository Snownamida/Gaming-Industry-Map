<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Film Industry Map | Global Cinema Landscape</title>
    <meta name="description"
        content="Interactive visualization of the global film industry structure, connecting studios, directors, and major works.">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="style.css">

    <!-- ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
</head>

<body>
    <div id="app">
        <header>
            <div class="logo">
                <h1>Film<span class="highlight">Map</span></h1>
                <p>The Cinematic Universe Visualized</p>
            </div>
            <div class="controls">
                <button class="btn-glass" id="lang-toggle" style="margin-right: 10px;">English</button>
                <button class="btn-glass" id="reset-zoom">Reset View</button>
            </div>
        </header>

        <main id="chart-container"></main>

        <div class="overlay-info" id="info-panel">
            <h3>Select a Node</h3>
            <p>Hover or click on a studio, person, or movie to reveal connections.</p>
        </div>

        <footer>
            <p>Data is illustrative. &copy; 2025 FilmMap.</p>
        </footer>
    </div>
    <script type="module" src="script.js"></script>
</body>

</html>
